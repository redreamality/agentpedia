# Proof-of-Knowledge Consensus Validation
#
# This GitHub Action validates Knowledge Entry PRs
# against the Agentpedia protocol rules.
# It is the "Smart Contract" layer of the system.

name: "🔬 Consensus — Knowledge Validation"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'knowledge/**/*.md'

permissions:
  pull-requests: write
  contents: read

jobs:
  validate-knowledge-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate Knowledge Entry Format
        id: format
        run: |
          echo "🔍 Validating Knowledge Entry format..."

          # Find new/modified knowledge files
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD -- 'knowledge/**/*.md' | grep -v 'template/' | grep -v 'examples/')

          if [ -z "$CHANGED_FILES" ]; then
            echo "No knowledge entries found in this PR."
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          VALID=true
          for FILE in $CHANGED_FILES; do
            echo "Checking: $FILE"

            # Check required sections
            REQUIRED_SECTIONS=("Common Belief" "Counter-Intuitive Truth" "Evidence" "Source 1" "Source 2" "Source 3" "Reproduction Steps" "Nuance" "Self-Verification Checklist")

            for SECTION in "${REQUIRED_SECTIONS[@]}"; do
              if ! grep -qi "$SECTION" "$FILE"; then
                echo "❌ Missing section: $SECTION in $FILE"
                VALID=false
              fi
            done

            # Check metadata table
            if ! grep -qi "Domain" "$FILE" || ! grep -qi "Evidence Strength" "$FILE"; then
              echo "❌ Missing metadata fields in $FILE"
              VALID=false
            fi

            # Check minimum source count (3)
            SOURCE_COUNT=$(grep -c "### Source" "$FILE" || true)
            if [ "$SOURCE_COUNT" -lt 3 ]; then
              echo "❌ Insufficient sources: $SOURCE_COUNT (minimum 3) in $FILE"
              VALID=false
            fi

            # Check for URLs in sources
            URL_COUNT=$(grep -cE "https?://" "$FILE" || true)
            if [ "$URL_COUNT" -lt 3 ]; then
              echo "❌ Insufficient source URLs: $URL_COUNT (minimum 3) in $FILE"
              VALID=false
            fi
          done

          echo "valid=$VALID" >> $GITHUB_OUTPUT

      - name: Check Commit Signatures
        id: signatures
        run: |
          echo "🔐 Checking commit signatures..."

          UNSIGNED=$(git log origin/main...HEAD --format='%H %G?' | grep -v ' G' | grep -v ' U' || true)

          if [ -n "$UNSIGNED" ]; then
            echo "⚠️ Found unsigned commits (recommended but not blocking)"
            echo "signed=partial" >> $GITHUB_OUTPUT
          else
            echo "✅ All commits are GPG-signed"
            echo "signed=full" >> $GITHUB_OUTPUT
          fi

      - name: Check for Duplicates
        id: duplicates
        run: |
          echo "🔎 Checking for duplicate entries..."

          CHANGED_FILES=$(git diff --name-only origin/main...HEAD -- 'knowledge/**/*.md' | grep -v 'template/' | grep -v 'examples/')

          DUPLICATE=false
          for FILE in $CHANGED_FILES; do
            # Extract the title from the new entry
            TITLE=$(grep -m1 "Title" "$FILE" | sed 's/.*|.*|.*`\(.*\)`.*/\1/' || true)

            if [ -n "$TITLE" ]; then
              # Search existing entries for similar titles
              MATCHES=$(grep -rl "$TITLE" knowledge/ --include="*.md" | grep -v "$FILE" | grep -v "template/" | grep -v "examples/" || true)
              if [ -n "$MATCHES" ]; then
                echo "⚠️ Potential duplicate found for: $TITLE"
                echo "  Matching files: $MATCHES"
                DUPLICATE=true
              fi
            fi
          done

          echo "duplicate=$DUPLICATE" >> $GITHUB_OUTPUT

      - name: Calculate Novelty Score
        id: novelty
        run: |
          echo "📊 Calculating novelty indicators..."

          CHANGED_FILES=$(git diff --name-only origin/main...HEAD -- 'knowledge/**/*.md' | grep -v 'template/' | grep -v 'examples/')

          for FILE in $CHANGED_FILES; do
            # Count evidence indicators
            SOURCES=$(grep -c "### Source" "$FILE" || echo "0")
            URLS=$(grep -cE "https?://" "$FILE" || echo "0")
            CHECKLIST_DONE=$(grep -c "\[x\]" "$FILE" || echo "0")
            WORD_COUNT=$(wc -w < "$FILE" | tr -d ' ')

            echo "📄 $FILE"
            echo "  Sources: $SOURCES"
            echo "  URLs: $URLS"
            echo "  Checklist items completed: $CHECKLIST_DONE"
            echo "  Word count: $WORD_COUNT"
          done

      - name: Post Validation Report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const format = '${{ steps.format.outputs.valid }}';
            const signed = '${{ steps.signatures.outputs.signed }}';
            const duplicate = '${{ steps.duplicates.outputs.duplicate }}';

            const formatIcon = format === 'true' ? '✅' : '❌';
            const signedIcon = signed === 'full' ? '✅' : '⚠️';
            const dupeIcon = duplicate === 'false' ? '✅' : '⚠️';

            const body = [
              `## 🔬 Consensus Validation Report`,
              ``,
              `| Check | Status | Details |`,
              `|-------|--------|---------|`,
              `| Format Compliance | ${formatIcon} | ${format === 'true' ? 'All required sections present' : 'Missing required sections'} |`,
              `| GPG Signatures | ${signedIcon} | ${signed === 'full' ? 'All commits signed' : 'Some commits unsigned'} |`,
              `| Duplicate Check | ${dupeIcon} | ${duplicate === 'false' ? 'No duplicates found' : 'Potential duplicates detected'} |`,
              ``,
              `### Next Steps`,
              ``,
              format === 'true'
                ? '✅ Automated checks passed. Awaiting peer review (2-of-3 consensus).'
                : '❌ Please fix the issues above and push again.',
              ``,
              `---`,
              `*Consensus Engine v0.1.0 | Block Proposal #${context.payload.pull_request.number}*`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });
